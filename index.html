<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 걷기 프로젝트 v8</title>
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --warning: #ff9800; --lucky: #9c27b0; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; color: #333; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; margin-bottom: 15px; }
        .status-box { font-size: 1.8rem; font-weight: bold; text-align: center; padding: 20px; background: #fff; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 10px; color: var(--danger); }
        
        .day-row { padding: 15px 0; border-bottom: 1px solid #eee; }
        .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 5px; }
        .day-label { font-weight: bold; font-size: 1.1rem; }
        
        .badge-container { display: flex; gap: 4px; flex-wrap: wrap; }
        .status-badge { font-size: 0.65rem; padding: 3px 7px; border-radius: 20px; font-weight: bold; white-space: nowrap; }
        
        .badge-danger { background: #ffebee; color: var(--danger); }   /* 미달, 보충 */
        .badge-success { background: #e8f5e9; color: var(--primary); } /* 달성 */
        .badge-warning { background: #fff3e0; color: var(--warning); } /* 휴식 */
        .badge-lucky { background: #f3e5f5; color: var(--lucky); }    /* 안심 */

        .input-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
        .input-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; color: #888; font-weight: 600; }
        
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; box-sizing: border-box; }
        input[readonly] { background-color: #f9f9f9; color: #ccc; }
        
        .rest-check { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .summary-info { font-size: 0.8rem; color: #666; text-align: center; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 주간 최종 벌금</h2>
    <div class="status-box" id="finalPenalty">₩49,000</div>
    <div class="summary-info">
        기본 벌금 ₩49,000 (7,000보 × 7일 기준)<br>
        <strong>휴식 사용 시 7,000원이 자동 차감됩니다.</strong>
    </div>
</div>

<div class="card">
    <h2>📅 주간 기록</h2>
    <div id="weeklyContainer"></div>
</div>

<script>
    const MAX_PENALTY = 49000; 
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    
    function init() {
        const container = document.getElementById('weeklyContainer');
        days.forEach((day, index) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            row.innerHTML = `
                <div class="day-header">
                    <span class="day-label">${day}</span>
                    <div id="badge-area-${index}" class="badge-container"></div>
                </div>
                <div class="input-grid">
                    <div class="input-item">
                        <label>실제 걷기</label>
                        <input type="number" class="step-input" id="walk-${index}" min="0" placeholder="0" oninput="calculate()">
                    </div>
                    <div class="input-item">
                        <label>필라/자전거(회)</label>
                        <input type="number" class="spec-input" id="spec-${index}" min="0" placeholder="0" oninput="calculate()">
                    </div>
                    <div class="rest-check">
                        <label>휴식</label>
                        <input type="checkbox" id="rest-${index}" onchange="handleRest(${index})">
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
        calculate();
    }

    function handleRest(index) {
        const isRest = document.getElementById(`rest-${index}`).checked;
        const walkInput = document.getElementById(`walk-${index}`);
        const specInput = document.getElementById(`spec-${index}`);
        
        if (isRest) {
            walkInput.value = ""; specInput.value = "";
            walkInput.readOnly = true; specInput.readOnly = true;
        } else {
            walkInput.readOnly = false; specInput.readOnly = false;
        }
        calculate();
    }

    function createBadge(text, className) {
        return `<span class="status-badge ${className}">${text}</span>`;
    }

    function calculate() {
        let totalDeduction = 0;
        let prevDayStatus = "normal";

        days.forEach((_, i) => {
            const isRest = document.getElementById(`rest-${i}`).checked;
            const badgeArea = document.getElementById(`badge-area-${i}`);
            let badges = [];
            
            // 1. 휴식 처리 (7,000원 차감)
            if (isRest) {
                totalDeduction += 7000;
                badges.push(createBadge("🛌 휴식", "badge-warning"));
                badgeArea.innerHTML = badges.join('');
                prevDayStatus = "normal";
                return; 
            }

            let walkSteps = Math.max(0, parseInt(document.getElementById(`walk-${i}`).value) || 0);
            let specCount = Math.max(0, parseInt(document.getElementById(`spec-${i}`).value) || 0);
            
            // 음수 방지 로직
            if (document.getElementById(`walk-${i}`).value < 0) document.getElementById(`walk-${i}`).value = 0;
            if (document.getElementById(`spec-${i}`).value < 0) document.getElementById(`spec-${i}`).value = 0;

            let dailyTotal = walkSteps + (specCount * 7000);
            if (dailyTotal >= 21000) dailyTotal = 14000; 

            totalDeduction += dailyTotal;

            // 마크 판별 로직
            if (dailyTotal < 5000) {
                badges.push(createBadge("⚠️ 미달", "badge-danger"));
            } 
            if (dailyTotal >= 7000) {
                badges.push(createBadge("✅ 달성", "badge-success"));
            }
            if (prevDayStatus === "danger-zone" && dailyTotal < 9000) {
                badges.push(createBadge("🚨 보충", "badge-danger"));
            }
            if (dailyTotal >= 14000) {
                badges.push(createBadge("🍀 안심", "badge-lucky"));
            }

            badgeArea.innerHTML = badges.join('');
            prevDayStatus = (dailyTotal >= 5000 && dailyTotal < 7000) ? "danger-zone" : "normal";
        });

        let finalPenalty = MAX_PENALTY - totalDeduction;
        document.getElementById('finalPenalty').innerText = `₩${Math.max(0, finalPenalty).toLocaleString()}`;
    }

    window.onload = init;
</script>

</body>
</html>
