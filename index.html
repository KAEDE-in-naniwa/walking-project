<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>걷기 계산기</title>
    <link rel="apple-touch-icon" href="image_2d1f14.jpg">
    <link rel="icon" href="image_2d1f14.jpg">
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --warning: #ff9800; --lucky: #9c27b0; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 8px; color: #333; max-width: 400px; margin: 0 auto; font-size: 13px; line-height: 1.2; }
        .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 8px; }
        h2 { margin: 0 0 8px 0; color: #2c3e50; font-size: 0.9rem; border-left: 3px solid var(--primary); padding-left: 6px; }
        .status-box { font-size: 1.4rem; font-weight: bold; text-align: center; padding: 10px; background: #fff; border: 1.5px solid var(--primary); border-radius: 10px; color: var(--danger); }
        
        .day-row { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
        .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .day-label { font-weight: bold; font-size: 1rem; color: #444; }
        
        .badge-container { display: flex; gap: 3px; }
        .status-badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .badge-danger { background: #ffebee; color: var(--danger); }
        .badge-success { background: #e8f5e9; color: var(--primary); }
        .badge-warning { background: #fff3e0; color: var(--warning); }
        .badge-lucky { background: #f3e5f5; color: var(--lucky); }

        .input-section { display: flex; flex-direction: column; gap: 4px; }
        .walk-group { display: flex; align-items: center; gap: 6px; }
        input[type="number"] { flex: 1; padding: 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; height: 28px; }

        .check-group { display: flex; flex-wrap: wrap; gap: 4px; }
        .check-item { display: flex; align-items: center; gap: 2px; font-size: 0.7rem; background: #f0f2f0; padding: 3px 6px; border-radius: 4px; cursor: pointer; }
        .check-item input { margin: 0; width: 12px; height: 12px; }

        .footer-row { display: flex; justify-content: flex-end; margin-top: 2px; }
        .rest-toggle { font-size: 0.7rem; color: #999; display: flex; align-items: center; gap: 3px; }
    </style>
</head>
<body>

<div class="card" style="margin-bottom: 6px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
        <h2 style="margin:0;">💰 최종 벌금</h2>
        <div id="finalPenalty" style="font-size:1.2rem; font-weight:bold; color:var(--danger);">₩49,000</div>
    </div>
</div>

<div class="card">
    <div id="weeklyContainer"></div>
</div>

<script>
    const MAX_PENALTY = 49000;
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    
    function init() {
        const container = document.getElementById('weeklyContainer');
        days.forEach((day, index) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            row.innerHTML = `
                <div class="day-header">
                    <span class="day-label">${day}</span>
                    <div id="badge-area-${index}" class="badge-container"></div>
                </div>
                <div class="input-section">
                    <div class="walk-group">
                        <input type="number" id="walk-${index}" min="0" placeholder="걸음 수" oninput="calculate()">
                        <div class="check-group">
                            <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()">필라</label>
                            <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()">자전거</label>
                            <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()">요가</label>
                            <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()">기타</label>
                        </div>
                    </div>
                    <div class="footer-row">
                        <label class="rest-toggle"><input type="checkbox" id="rest-${index}" onchange="handleRest(${index})"> 휴식</label>
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
        calculate();
    }

    function handleRest(index) {
        const isRest = document.getElementById(`rest-${index}`).checked;
        const walkInput = document.getElementById(`walk-${index}`);
        const checks = document.querySelectorAll(`.ex-check-${index}`);
        walkInput.disabled = isRest;
        if (isRest) walkInput.value = "";
        checks.forEach(c => { c.disabled = isRest; if (isRest) c.checked = false; });
        calculate();
    }

    function calculate() {
        let totalDeduction = 0;
        let prevGap = 0; 

        days.forEach((_, i) => {
            const isRest = document.getElementById(`rest-${i}`).checked;
            const badgeArea = document.getElementById(`badge-area-${i}`);
            let badges = [];
            
            if (isRest) {
                totalDeduction += 7000;
                badgeArea.innerHTML = `<span class="status-badge badge-warning">🛌 휴식</span>`;
                prevGap = 0; return;
            }

            let walk = parseInt(document.getElementById(`walk-${i}`).value) || 0;
            let exBonus = 0;
            document.querySelectorAll(`.ex-check-${i}:checked`).forEach(c => exBonus += parseInt(c.value));
            
            let dailyTotal = walk + exBonus;
            totalDeduction += (dailyTotal >= 14000) ? 14000 : dailyTotal;

            if (dailyTotal < 5000) badges.push(`<span class="status-badge badge-danger">⚠️ 미달</span>`);
            if (dailyTotal >= 5000 && dailyTotal < 7000) badges.push(`<span class="status-badge badge-danger">🚨 익일 보충</span>`);
            
            let target = 7000 + prevGap;
            if (dailyTotal >= target && dailyTotal >= 7000) badges.push(`<span class="status-badge badge-success">✅ 달성</span>`);
            if (dailyTotal >= 14000) badges.push(`<span class="status-badge badge-lucky">🍀 안심</span>`);

            badgeArea.innerHTML = badges.join('');
            prevGap = (dailyTotal >= 5000 && dailyTotal < 7000) ? (7000 - dailyTotal) : 0;
        });

        document.getElementById('finalPenalty').innerText = `₩${Math.max(0, MAX_PENALTY - totalDeduction).toLocaleString()}`;
    }
    window.onload = init;
</script>
</body>
</html>
