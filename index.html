<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>걷기 계산기</title>
    
    <!-- 사용자 제공 아이콘 적용 -->
    <link rel="apple-touch-icon" href="image_2d1f14.jpg">
    <link rel="icon" href="image_2d1f14.jpg">
    
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --warning: #ff9800; --lucky: #9c27b0; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; color: #333; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; margin-bottom: 15px; }
        .status-box { font-size: 1.8rem; font-weight: bold; text-align: center; padding: 20px; background: #fff; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 10px; color: var(--danger); }
        
        .day-row { padding: 15px 0; border-bottom: 1px solid #eee; }
        .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 5px; }
        .day-label { font-weight: bold; font-size: 1.1rem; }
        
        .badge-container { display: flex; gap: 4px; flex-wrap: wrap; }
        .status-badge { font-size: 0.65rem; padding: 3px 7px; border-radius: 20px; font-weight: bold; }
        .badge-danger { background: #ffebee; color: var(--danger); }
        .badge-success { background: #e8f5e9; color: var(--primary); }
        .badge-warning { background: #fff3e0; color: var(--warning); }
        .badge-lucky { background: #f3e5f5; color: var(--lucky); }

        .input-section { display: flex; flex-direction: column; gap: 10px; }
        .walk-group { display: flex; align-items: center; gap: 10px; }
        .walk-group label { font-size: 0.8rem; font-weight: bold; width: 50px; }
        input[type="number"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }

        .check-group { display: flex; flex-wrap: wrap; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .check-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; cursor: pointer; }
        .check-item input { margin: 0; cursor: pointer; }

        .footer-row { display: flex; justify-content: flex-end; align-items: center; gap: 5px; margin-top: 5px; }
        .rest-toggle { font-size: 0.75rem; color: #888; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 주간 최종 벌금</h2>
    <div class="status-box" id="finalPenalty">₩49,000</div>
</div>

<div class="card">
    <h2>📅 주간 기록</h2>
    <div id="weeklyContainer"></div>
</div>

<script>
    const MAX_PENALTY = 49000;
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    
    function init() {
        const container = document.getElementById('weeklyContainer');
        days.forEach((day, index) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            row.innerHTML = `
                <div class="day-header">
                    <span class="day-label">${day}</span>
                    <div id="badge-area-${index}" class="badge-container"></div>
                </div>
                <div class="input-section">
                    <div class="walk-group">
                        <label>걸음 수</label>
                        <input type="number" id="walk-${index}" min="0" placeholder="0" oninput="calculate()">
                    </div>
                    <div class="check-group">
                        <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()"> 필라(60m)</label>
                        <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()"> 자전거(30m)</label>
                        <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()"> 요가(60m)</label>
                        <label class="check-item"><input type="checkbox" class="ex-check-${index}" value="7000" onchange="calculate()"> 대체운동</label>
                    </div>
                    <div class="footer-row">
                        <label class="rest-toggle"><input type="checkbox" id="rest-${index}" onchange="handleRest(${index})"> 휴식</label>
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
        calculate();
    }

    function handleRest(index) {
        const isRest = document.getElementById(`rest-${index}`).checked;
        const walkInput = document.getElementById(`walk-${index}`);
        const checks = document.querySelectorAll(`.ex-check-${index}`);
        
        walkInput.disabled = isRest;
        if (isRest) walkInput.value = "";
        checks.forEach(c => {
            c.disabled = isRest;
            if (isRest) c.checked = false;
        });
        calculate();
    }

    function calculate() {
        let totalDeduction = 0;
        let prevGap = 0; 

        days.forEach((_, i) => {
            const isRest = document.getElementById(`rest-${i}`).checked;
            const badgeArea = document.getElementById(`badge-area-${i}`);
            let badges = [];
            
            if (isRest) {
                totalDeduction += 7000;
                badgeArea.innerHTML = `<span class="status-badge badge-warning">🛌 휴식</span>`;
                prevGap = 0; return;
            }

            let walk = parseInt(document.getElementById(`walk-${i}`).value) || 0;
            let exBonus = 0;
            document.querySelectorAll(`.ex-check-${i}:checked`).forEach(c => exBonus += parseInt(c.value));
            
            let dailyTotal = walk + exBonus;
            totalDeduction += (dailyTotal >= 14000) ? 14000 : dailyTotal;

            if (dailyTotal < 5000) badges.push(`<span class="status-badge badge-danger">⚠️ 미달</span>`);
            if (dailyTotal >= 5000 && dailyTotal < 7000) badges.push(`<span class="status-badge badge-danger">🚨 익일 보충</span>`);
            
            let target = 7000 + prevGap;
            if (dailyTotal >= target && dailyTotal >= 7000) {
                badges.push(`<span class="status-badge badge-success">✅ 달성</span>`);
            }
            if (dailyTotal >= 14000) badges.push(`<span class="status-badge badge-lucky">🍀 안심</span>`);

            badgeArea.innerHTML = badges.join('');
            prevGap = (dailyTotal >= 5000 && dailyTotal < 7000) ? (7000 - dailyTotal) : 0;
        });

        document.getElementById('finalPenalty').innerText = `₩${Math.max(0, MAX_PENALTY - totalDeduction).toLocaleString()}`;
    }

    window.onload = init;
</script>
</body>
</html>
