<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 걷기 프로젝트 v5</title>
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --warning: #ff9800; --lucky: #9c27b0; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; color: #333; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; margin-bottom: 15px; }
        .status-box { font-size: 1.8rem; font-weight: bold; text-align: center; padding: 20px; background: #fff; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 10px; color: var(--danger); }
        
        .day-row { padding: 15px 0; border-bottom: 1px solid #eee; }
        .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .day-label { font-weight: bold; font-size: 1.1rem; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        
        .badge-danger { background: #ffebee; color: var(--danger); } /* 위기 */
        .badge-lucky { background: #f3e5f5; color: var(--lucky); }  /* 안심/행운 */
        .badge-none { display: none; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; color: #888; }
        
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .summary-info { font-size: 0.8rem; color: #666; text-align: center; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 이번 주 최종 벌금</h2>
    <div class="status-box" id="finalPenalty">₩49,000</div>
    <div class="summary-info">
        1걸음 = 1원 차감 (기본 ₩49,000)<br>
        <strong>필라테스/자전거는 기본 7,000보 합산</strong>
    </div>
</div>

<div class="card">
    <h2>📅 주간 기록 (중복 입력 가능)</h2>
    <div id="weeklyContainer">
        <!-- 요일별 로우 자동 생성 -->
    </div>
</div>

<script>
    const MAX_PENALTY = 49000;
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    
    function init() {
        const container = document.getElementById('weeklyContainer');
        days.forEach((day, index) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            row.innerHTML = `
                <div class="day-header">
                    <span class="day-label">${day}</span>
                    <span id="badge-${index}" class="status-badge badge-none"></span>
                </div>
                <div class="input-grid">
                    <div class="input-item">
                        <label>실제 걷기</label>
                        <input type="number" class="step-input" id="walk-${index}" placeholder="0" oninput="calculate()">
                    </div>
                    <div class="input-item">
                        <label>필라/자전거(회)</label>
                        <input type="number" class="special-input" id="spec-${index}" placeholder="0" oninput="calculate()">
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
        calculate();
    }

    function calculate() {
        let totalDeduction = 0;
        let prevDayStatus = "normal"; // 전날 상태 추적용

        days.forEach((_, i) => {
            const walkSteps = parseInt(document.getElementById(`walk-${i}`).value) || 0;
            const specCount = parseInt(document.getElementById(`spec-${i}`).value) || 0;
            const badge = document.getElementById(`badge-${i}`);
            
            // 1. 합산 로직 (필라테스 1회당 7,000보)
            let dailyTotal = walkSteps + (specCount * 7000);
            
            // 2. 3일 몰아걷기 캡 (21,000보 이상은 14,000보로 제한)
            if (dailyTotal >= 21000) dailyTotal = 14000;

            totalDeduction += dailyTotal;

            // 3. 상태 표시 로직
            badge.className = "status-badge badge-none"; // 초기화
            
            // [위기 표시] 전날 5000~7000 사이였고, 오늘 아직 9000 미만인 경우
            if (prevDayStatus === "danger-zone") {
                if (dailyTotal < 9000) {
                    badge.innerText = "🚨 보충 위기 (9천보 목표)";
                    badge.className = "status-badge badge-danger";
                }
            }

            // [안심/행운 표시] 14,000보 이상인 경우
            if (dailyTotal >= 14000) {
                badge.innerText = "🍀 행운/안심 (최고)";
                badge.className = "status-badge badge-lucky";
            }

            // 다음 루프를 위해 현재 상태 저장
            if (dailyTotal >= 5000 && dailyTotal < 7000) {
                prevDayStatus = "danger-zone";
            } else {
                prevDayStatus = "normal";
            }
        });

        let finalPenalty = MAX_PENALTY - totalDeduction;
        if (finalPenalty < 0) finalPenalty = 0;
        
        document.getElementById('finalPenalty').innerText = `₩${finalPenalty.toLocaleString()}`;
    }

    window.onload = init;
</script>

</body>
</html>
