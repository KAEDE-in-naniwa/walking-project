<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 걷기 프로젝트 v4</title>
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; color: #333; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; margin-bottom: 15px; }
        .status-box { font-size: 1.8rem; font-weight: bold; text-align: center; padding: 20px; background: #fff; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 10px; color: var(--danger); }
        
        .day-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; gap: 10px; }
        .day-label { font-weight: bold; width: 30px; color: #555; text-align: center; }
        
        .input-wrapper { flex: 2; position: relative; }
        .step-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; text-align: right; }
        
        .type-sel { flex: 1.5; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 0.8rem; background: #f9f9f9; }
        
        .summary-info { font-size: 0.8rem; color: #666; text-align: center; margin-top: 10px; line-height: 1.5; }
        .success-text { color: var(--primary); font-size: 0.75rem; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 이번 주 최종 벌금</h2>
    <div class="status-box" id="finalPenalty">₩49,000</div>
    <div class="summary-info">
        기본 벌금 ₩49,000 (7,000보 × 7일)<br>
        <strong>1걸음 = 1원 차감</strong> (미달 시에도 걸은 만큼 차감)
    </div>
</div>

<div class="card">
    <h2>📅 주간 기록 입력</h2>
    <div id="weeklyContainer">
        <!-- 요일별 로우 자동 생성 -->
    </div>
</div>

<script>
    const MAX_PENALTY = 49000;
    const DAILY_TARGET = 7000;
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    
    function init() {
        const container = document.getElementById('weeklyContainer');
        days.forEach((day, index) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            row.innerHTML = `
                <div class="day-label">${day}</div>
                <div class="type-sel-wrapper">
                    <select class="type-sel" id="type-${index}" onchange="handleTypeChange(${index})">
                        <option value="walk">걷기</option>
                        <option value="special">자전거/필라</option>
                        <option value="rest">정기 휴식</option>
                    </select>
                </div>
                <div class="input-wrapper">
                    <input type="number" class="step-input" id="steps-${index}" 
                           placeholder="걸음 수" oninput="calculate()">
                </div>
            `;
            container.appendChild(row);
        });
        calculate();
    }

    function handleTypeChange(index) {
        const type = document.getElementById(`type-${index}`).value;
        const input = document.getElementById(`steps-${index}`);
        
        if (type === 'special' || type === 'rest') {
            input.value = 7000; // 자전거/필라테스/휴식은 7천보 자동 입력
            input.readOnly = true;
            input.style.backgroundColor = "#f0fdf4";
        } else {
            input.value = "";
            input.readOnly = false;
            input.style.backgroundColor = "#fff";
        }
        calculate();
    }

    function calculate() {
        let totalStepsWon = 0;
        const inputs = document.querySelectorAll('.step-input');

        inputs.forEach((input) => {
            let val = parseInt(input.value) || 0;
            
            // 규칙 반영: 21,000보 이상 입력 시 14,000보로 계산 (3일 분량 무효)
            if (val >= 21000) {
                val = 14000;
            }
            
            totalStepsWon += val;
        });

        let finalPenalty = MAX_PENALTY - totalStepsWon;
        if (finalPenalty < 0) finalPenalty = 0;
        
        document.getElementById('finalPenalty').innerText = `₩${finalPenalty.toLocaleString()}`;
    }

    window.onload = init;
</script>

</body>
</html>
